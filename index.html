<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Elif Eylül Eryılmaz</title>
    <style>
        /* CSS DEĞİŞKENLERİ */
        :root {
            --navy: #0a192f;
            --card-navy: #112240;
            --mint: #64ffda;
            --silver: #ccd6f6;
            --slate: #8892b0;
            --transition: 0.3s ease;
        }

        body {
            background-color: var(--navy);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            color: var(--silver);
        }

        /* GELİŞMİŞ SEÇİCİLER (Combinators) */
        .card {
            background-color: var(--card-navy);
            width: 300px;
            padding: 30px;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 15px 35px rgba(0,0,0,0.3);
            border: 1px solid rgba(100, 255, 218, 0.1);
            transition: var(--transition);
        }

        .card:hover {
            transform: translateY(-8px); /* Havalı bir yükselme efekti */
            border-color: var(--mint);
        }

        .p-img {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            border: 2px solid var(--mint);
            padding: 4px;
            margin-bottom: 15px;
            object-fit: cover;
        }

        h3 { margin: 10px 0 5px; font-size: 1.4rem; color: #fff; }

        /* Bitişik Kardeş Seçici: h3'ten hemen sonra gelen p */
        h3 + p { 
            color: var(--mint); 
            font-family: 'Courier New', monospace; 
            font-size: 0.9rem;
            margin-bottom: 15px;
        }

        /* Kısa, Öz ve Tatlı Paragraf */
        .bio {
            font-size: 0.85rem;
            color: var(--slate);
            line-height: 1.5;
            margin-bottom: 25px;
        }

        /* Öznitelik Seçici (Attribute Selector) */
        a[target="_blank"] {
            text-decoration: none;
            color: var(--mint);
            border: 1px solid var(--mint);
            padding: 8px 18px;
            border-radius: 5px;
            font-size: 0.85rem;
            font-weight: bold;
            transition: var(--transition);
        }

        a[target="_blank"]:hover {
            background: rgba(100, 255, 218, 0.1);
        }
    </style>
</head>
<body>

    <div class="card">
        <img src="fotoğraf1.jpeg" alt="Elif Eylül" class="p-img">
        
        <h3>Elif Eylül Eryılmaz</h3>
        <p>&lt;Computer Programmer /&gt;</p>
        
        <p class="bio">
            Karmaşık kodları tatlı çözümlere dönüştürmeyi seven bir yazılımcı adayıyım. Estetik tasarımlar ve temiz kodlar en sevdiğim ikili! ✨
        </p>
        
        <div class="links">
            <a href="https://github.com/elifeylul" target="_blank">GitHub</a>
        </div>
    </div>

</body>
</html>
